name: PR Welcome Comment

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Leave a welcome comment on new pull requests
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const issueNumber = context.payload.pull_request.number;
              const marker = '<!-- friendchise-pr-welcome -->';
              const message = `${marker}\nThanks for opening this pull request and for contributing to FriendChise. Please note that reviews can take up to 3 days, and we really appreciate your patience while we look it over.`;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const alreadyPosted = comments.some((comment) =>
                comment.body?.includes(marker),
              );

              if (alreadyPosted) {
                core.info(`Welcome comment already exists on PR #${issueNumber}.`);
                return;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: message,
              });
            } catch (error) {
              core.warning(`Skipping PR welcome comment: ${error.message}`);
            }