name: Good First Issue Follow-up

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  welcome:
    if: >-
      github.event_name == 'issues' &&
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'good first issue')
    runs-on: ubuntu-latest

    steps:
      - name: Assign and comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const marker = '<!-- good-first-issue-follow-up -->';

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              },
            );

            const alreadyCommented = comments.some((comment) =>
              comment.body?.includes(marker),
            );

            if (alreadyCommented) {
              core.info(`Follow-up comment already exists for issue #${issue.number}.`);
              return;
            }

            let assigned = false;

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [author],
              });
              assigned = true;
            } catch (error) {
              core.warning(`Could not assign @${author} to issue #${issue.number}: ${error.message}`);
            }

            const assignmentLine = assigned
              ? `You have been assigned to this issue.`
              : `We could not assign you automatically, so please treat this as your claim on the issue.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `${marker}\n\nHi @${author},\n\n${assignmentLine}\n\nPlease aim to finish this within 2 days. If you need setup help, start here: https://friendchise.app/doc/development/quick-start.\n\nIf you enjoy the project, please star the repository to support the project.\n\nIf you need help, leave a comment here and we can unblock you.`,
            });

  claim:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'good first issue')
    runs-on: ubuntu-latest

    steps:
      - name: Assign commenter who claimed the issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const claimant = comment.user.login;
            const body = comment.body.toLowerCase().trim();
            const marker = '<!-- good-first-issue-claim -->';
            const claimPhrases = [
              'i want to take this',
              'claiming this issue',
              'i\'ll work on this',
            ];

            const matched = claimPhrases.some((phrase) => body.includes(phrase));
            if (!matched) {
              core.info('No claim phrase found in the comment.');
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              },
            );

            const alreadyCommented = comments.some((existingComment) =>
              existingComment.body?.includes(marker),
            );

            if (alreadyCommented) {
              core.info(`Claim comment already exists for issue #${issue.number}.`);
              return;
            }

            let assigned = false;

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [claimant],
              });
              assigned = true;
            } catch (error) {
              core.warning(`Could not assign @${claimant} to issue #${issue.number}: ${error.message}`);
            }

            const assignmentLine = assigned
              ? `You have been assigned to this issue.`
              : `We could not assign you automatically, so please treat this as your claim on the issue.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `${marker}\n\nHi @${claimant},\n\n${assignmentLine}\n\nPlease aim to finish this within 2 days. If you need setup help, start here: https://friendchise.app/doc/development/quick-start.\n\nIf you enjoy the project, please star the repository to support the project.\n\nIf someone else is already working on this, leave a note here and we can sort it out.`,
            });