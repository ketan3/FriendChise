name: Auto Assign Claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Assign commenter who claimed the issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const claimant = comment.user.login;
            const body = comment.body.trim();
            const claimPhrase = 'i want to work on this';

            if (body !== claimPhrase) {
              core.info('No exact claim phrase found in the comment.');
              return;
            }

            const { data: freshIssue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const alreadyAssigned = (freshIssue.assignees ?? []).some(
              (assignee) => assignee.login === claimant,
            );

            if (alreadyAssigned) {
              core.info(`@${claimant} is already assigned to issue #${issue.number}.`);
              return;
            }

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [claimant],
              });
            } catch (error) {
              core.warning(`Could not assign @${claimant} to issue #${issue.number}: ${error.message}`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Hi @${claimant}, I assigned this issue to you.`,
            });